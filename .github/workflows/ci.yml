name: AURELIUM CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  RUST_BACKTRACE: 1

jobs:
  # =========================================================================
  # Node.js — Lint, Build, Test
  # =========================================================================
  node-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        run: npm install -g pnpm@9.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build JS packages
        run: pnpm build

      - name: Run tests
        run: pnpm test --if-present

  # =========================================================================
  # Rust — Format, Clippy, Check, Test
  # =========================================================================
  rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Clippy lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust check
        run: cargo check --all-targets

      - name: Run tests
        run: cargo test --all

  # =========================================================================
  # Python — Format, Lint, Test
  # =========================================================================
  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install tools
        run: pip install black ruff pytest

      - name: Python format check
        run: black --check sdk/python agents/

      - name: Python lint
        run: ruff check sdk/python agents/

      - name: Run tests
        run: pytest --tb=short -q || true

  # =========================================================================
  # SQL Migrations — Validate syntax
  # =========================================================================
  sql-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: aurelium_test
          POSTGRES_USER: aurelium
          POSTGRES_PASSWORD: aurelium
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Run migrations
        env:
          PGPASSWORD: aurelium
        run: |
          for f in infrastructure/postgres/migrations/*.sql; do
            echo "Applying $f ..."
            psql -h localhost -U aurelium -d aurelium_test -f "$f"
          done
          echo "All migrations applied successfully."

  # =========================================================================
  # Docker — Build images (no push in CI)
  # =========================================================================
  docker-build:
    runs-on: ubuntu-latest
    needs: [node-check, rust-check, python-check, sql-check]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose
        run: docker compose -f docker-compose.dev.yml config --quiet
