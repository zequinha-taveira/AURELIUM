version: "3.9"

services:

  # ==========================================================================
  # DATA LAYER
  # ==========================================================================

  postgres:
    image: postgres:17
    container_name: aurelium-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aurelium
      POSTGRES_USER: aurelium
      POSTGRES_PASSWORD: aurelium
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/migrations:/docker-entrypoint-initdb.d

  neo4j:
    image: neo4j:5
    container_name: aurelium-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/aurelium
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant
    container_name: aurelium-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ==========================================================================
  # MESSAGING LAYER
  # ==========================================================================

  nats:
    image: nats:latest
    container_name: aurelium-nats
    command: ["--js", "--sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data

  # ==========================================================================
  # STORAGE LAYER
  # ==========================================================================

  minio:
    image: minio/minio
    container_name: aurelium-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aurelium
      MINIO_ROOT_PASSWORD: aurelium123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # ==========================================================================
  # OBSERVABILITY LAYER
  # ==========================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: aurelium-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: aurelium-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: aurelium
      GF_SECURITY_ADMIN_PASSWORD: aurelium
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:latest
    container_name: aurelium-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
  nats_data:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data: